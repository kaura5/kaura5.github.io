<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flexbox</title>
    <!-- custom css -->
     <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <header>
        <h1>Company Name</h1>
    </header>
    <!-- main region -->
     <main>
        <section>
            <h2>Flex direction and wrap</h2>
            <div class="boxes">
                <div class="box box1">A</div>
                <div class="box box2">B</div>
                <div class="box box3">C</div>
                <div class="box box4">D</div>
                <div class="box box5">E</div>
            </div>
        </section>
        <!-- flex main axis controls -->
         <section>
            <h2>Flex elements controlled on main axis</h2>
            <div class="boxes1">
                <div class="box box1">A</div>
                <div class="box box2">B</div>
                <div class="box box3">C</div>
                <div class="box box4">D</div>
                <div class="box box5">E</div>
            </div>
        </section>
        <!-- flex cross axis controls -->
         <section>
            <h2>Flex elements controlled on cross axis</h2>
            <div class="boxes2">
                <div class="box box1">A</div>
                <div class="box box2">B</div>
                <div class="box box3">C</div>
                <div class="box box4">D</div>
                <div class="box box5">E</div>
            </div>
        </section>
     </main>
</body>
</html>
